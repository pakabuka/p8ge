<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>p8ge.cc</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --card: #fffdf8;
      --line: #262626;
      --muted: #626262;
      --soft: #e4ded1;
      --good: #176b35;
      --bad: #a32020;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      padding: 24px;
      background: var(--bg);
      color: var(--line);
      font-family: Georgia, 'Times New Roman', serif;
    }

    main {
      width: min(900px, 100%);
      margin: 8vh auto 0;
      background: var(--card);
      border: 3px double var(--line);
      padding: clamp(22px, 5vw, 42px);
      box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.4rem, 8vw, 5rem);
      line-height: 0.95;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    p {
      margin: 0 0 24px;
      color: var(--muted);
      line-height: 1.65;
    }

    form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: stretch;
    }

    input, button, a.button {
      font: inherit;
      font-family: 'Courier New', Courier, monospace;
    }

    input {
      width: 100%;
      border: 2px solid var(--line);
      background: transparent;
      color: var(--line);
      padding: 14px 16px;
      outline: none;
      min-width: 0;
    }

    input:focus {
      box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.2);
    }

    button, a.button {
      border: 2px solid var(--line);
      background: var(--line);
      color: var(--card);
      padding: 13px 16px;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.14s ease, opacity 0.14s ease;
      white-space: nowrap;
    }

    button:hover, a.button:hover { transform: translateY(-1px); }
    button:disabled { cursor: not-allowed; opacity: 0.6; transform: none; }

    .status {
      min-height: 24px;
      margin-top: 18px;
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }

    .status.good { color: var(--good); }
    .status.bad { color: var(--bad); }

    .queue {
      margin-top: 22px;
      display: grid;
      gap: 12px;
    }

    .queue-empty {
      border: 1px dashed var(--muted);
      padding: 16px;
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
      line-height: 1.5;
    }

    .snapshot-row {
      border: 2px solid var(--line);
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 160px;
      gap: 14px;
      align-items: center;
      background: rgba(255, 255, 255, 0.42);
    }

    .row-url {
      font-family: 'Courier New', Courier, monospace;
      overflow-wrap: anywhere;
      line-height: 1.45;
    }

    .row-meta {
      margin-top: 9px;
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;
      line-height: 1.45;
      min-height: 20px;
    }

    .progress {
      margin-top: 10px;
      display: none;
      grid-template-columns: 1fr 48px;
      align-items: center;
      gap: 10px;
    }

    .progress.show { display: grid; }

    .progress-track {
      height: 12px;
      border: 1px solid var(--line);
      background: var(--soft);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--line);
      transition: width 0.2s ease;
    }

    .progress-text {
      color: var(--muted);
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.84rem;
      text-align: right;
    }

    .row-action {
      min-width: 150px;
      width: 100%;
    }

    @media (max-width: 720px) {
      main { margin-top: 2vh; }
      form, .snapshot-row { grid-template-columns: 1fr; }
      button, a.button { width: 100%; }
      .row-action { min-width: 0; }
    }
  </style>
</head>
<body>
  <main>
    <h1>p8ge.cc</h1>
    <p>Add one or more links, then capture each page when you are ready.</p>

    <form id="addForm">
      <input id="urlInput" type="text" placeholder="https://example.com" autocomplete="url" required />
      <button id="addBtn" type="submit">Add</button>
    </form>

    <div id="status" class="status">Ready.</div>
    <div id="queue" class="queue" aria-live="polite"></div>
  </main>

  <script>
    const addForm = document.getElementById('addForm');
    const input = document.getElementById('urlInput');
    const statusEl = document.getElementById('status');
    const queueEl = document.getElementById('queue');

    const state = {
      items: []
    };

    function setStatus(message, type = '') {
      statusEl.textContent = message;
      statusEl.className = 'status' + (type ? ` ${type}` : '');
    }

    function escapeHtml(value = '') {
      return String(value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeUrlForClient(raw) {
      const trimmed = String(raw || '').trim();
      if (!trimmed) return '';
      return /^https?:\/\//i.test(trimmed) ? trimmed : `https://${trimmed}`;
    }

    function splitInputLinks(value) {
      return String(value || '')
        .split(/[\n,]+/)
        .map((part) => normalizeUrlForClient(part))
        .filter(Boolean);
    }

    function getItem(id) {
      return state.items.find((item) => item.id === id);
    }

    function renderQueue() {
      if (!state.items.length) {
        queueEl.innerHTML = '<div class="queue-empty">No links added yet.</div>';
        return;
      }

      queueEl.innerHTML = state.items.map((item) => {
        const progress = Math.max(0, Math.min(100, Math.round(item.progress || 0)));
        const action = item.status === 'done'
          ? `<a class="button row-action" href="${escapeHtml(item.downloadUrl)}" download>Download</a>`
          : `<button class="row-action" type="button" data-action="capture" data-id="${escapeHtml(item.id)}" ${item.status === 'rendering' ? 'disabled' : ''}>Proceed</button>`;

        return `
          <div class="snapshot-row" data-id="${escapeHtml(item.id)}">
            <div>
              <div class="row-url">${escapeHtml(item.url)}</div>
              <div class="progress ${item.status === 'rendering' || item.status === 'done' ? 'show' : ''}">
                <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
                <div class="progress-text">${progress}%</div>
              </div>
              <div class="row-meta">${escapeHtml(item.message || '')}</div>
            </div>
            <div>${action}</div>
          </div>
        `;
      }).join('');
    }

    function updateItem(id, patch) {
      const item = getItem(id);
      if (!item) return;
      Object.assign(item, patch);
      renderQueue();
    }

    function startProgress(item) {
      stopProgress(item);
      item.progress = 6;
      item.progressTimer = window.setInterval(() => {
        const current = item.progress || 0;
        const increment = current < 30 ? 7 : current < 60 ? 5 : current < 84 ? 3 : 1;
        item.progress = Math.min(94, current + increment);
        renderQueue();
      }, 260);
      renderQueue();
    }

    function stopProgress(item, finalValue = null) {
      if (item && item.progressTimer) {
        window.clearInterval(item.progressTimer);
        item.progressTimer = null;
      }
      if (item && finalValue !== null) {
        item.progress = finalValue;
      }
    }

    async function requestSnapshot(url) {
      const response = await fetch('/api/snapshot', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url })
      });

      const raw = await response.text();
      let data = {};
      try { data = raw ? JSON.parse(raw) : {}; }
      catch { data = {}; }

      if (!response.ok) {
        throw new Error(data.error || raw || `Request failed (${response.status}).`);
      }
      return data;
    }

    async function captureItem(id) {
      const item = getItem(id);
      if (!item || item.status === 'rendering' || item.status === 'done') return;

      item.status = 'rendering';
      item.message = 'Rendering snapshot…';
      startProgress(item);
      setStatus(`Rendering ${item.url}`);

      try {
        const data = await requestSnapshot(item.url);
        const snapshot = data.snapshot;
        stopProgress(item, 100);
        updateItem(id, {
          status: 'done',
          progress: 100,
          downloadUrl: snapshot.downloadUrl,
          message: snapshot.title ? `Ready: ${snapshot.title}` : 'Ready to download.'
        });
        setStatus('Snapshot ready.', 'good');
      } catch (error) {
        stopProgress(item, 0);
        updateItem(id, {
          status: 'error',
          progress: 0,
          message: error.message || 'Capture failed.'
        });
        setStatus(error.message || 'Capture failed.', 'bad');
      }
    }

    addForm.addEventListener('submit', (event) => {
      event.preventDefault();
      const urls = splitInputLinks(input.value);
      if (!urls.length) {
        setStatus('Enter at least one link.', 'bad');
        return;
      }

      const existing = new Set(state.items.map((item) => item.url));
      let added = 0;
      urls.forEach((url) => {
        if (existing.has(url)) return;
        existing.add(url);
        state.items.push({
          id: window.crypto?.randomUUID?.() || String(Date.now() + Math.random()),
          url,
          status: 'ready',
          progress: 0,
          message: 'Ready.',
          downloadUrl: '',
          progressTimer: null
        });
        added += 1;
      });

      input.value = '';
      renderQueue();
      setStatus(added ? `Added ${added} link${added === 1 ? '' : 's'}.` : 'Those links are already in the list.', added ? 'good' : '');
    });

    queueEl.addEventListener('click', (event) => {
      const button = event.target.closest('[data-action="capture"]');
      if (!button) return;
      captureItem(button.dataset.id);
    });

    renderQueue();
  </script>
</body>
</html>
